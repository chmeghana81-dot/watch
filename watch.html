<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple E-Commerce Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    /* Navbar */
    .navbar{
      background:#111;
      color:white;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#00bcd4;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:#00bcd4;
    }

    /* Hero Section */
    .hero{
      height:350px;
      background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
    }

    .hero-content{
      background:rgba(0,0,0,0.6);
      padding:30px;
      border-radius:10px;
    }

    .hero h1{
      font-size:45px;
      margin-bottom:10px;
    }

    .hero p{
      margin-bottom:20px;
      font-size:18px;
    }

    .btn{
      background:#00bcd4;
      color:white;
      padding:12px 25px;
      border:none;
      border-radius:5px;
      text-decoration:none;
      font-size:16px;
    }

    /* Products */
    .products{
      padding:50px 40px;
    }

    .section-title{
      text-align:center;
      margin-bottom:40px;
      font-size:35px;
      color:#333;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .product-card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-5px);
    }

    .product-card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .product-info{
      padding:20px;
      text-align:center;
    }

    .product-info h3{
      margin-bottom:10px;
      color:#333;
    }

    .price{
      color:#00bcd4;
      font-size:22px;
      margin-bottom:15px;
      font-weight:bold;
    }

    .buy-btn{
      background:#111;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
    }

    .buy-btn:hover{
      background:#00bcd4;
    }

    /* Footer */
    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">ShopEasy</div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Offers</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to ShopEasy</h1>
      <p>Best Deals on Fashion, Electronics & More</p>
      <a href="#" class="btn">Shop Now</a>
    </div>
  </section>

  <!-- Products -->
  <section class="products">
    <h2 class="section-title">Featured Products</h2>

    <div class="product-grid">

      <!-- Product 1 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800&auto=format&fit=crop" alt="Shoes">

        <div class="product-info">
          <h3>Running Shoes</h3>
          <p class="price">₹2,999</p>
          <button class="buy-btn">Buy Now</button>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800&auto=format&fit=crop" alt="Tshirt">

        <div class="product-info">
          <h3>Casual T-Shirt</h3>
          <p class="price">₹799</p>
          <button class="buy-btn">Buy Now</button>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800&auto=format&fit=crop" alt="Mobile">

        <div class="product-info">
          <h3>Smart Phone</h3>
          <p class="price">₹19,999</p>
          <button class="buy-btn">Buy Now</button>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800&auto=format&fit=crop" alt="Headphones">

        <div class="product-info">
          <h3>Wireless Headphones</h3>
          <p class="price">₹1,499</p>
          <button class="buy-btn">Buy Now</button>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 ShopEasy. All Rights Reserved.</p>
  </footer>

</body>
</html>
